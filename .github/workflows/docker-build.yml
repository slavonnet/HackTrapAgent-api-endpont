name: docker-build

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:
  release:
    types:
      - published

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Docker image
        run: docker build -t ghcr.io/slavonnet/hacktrapagent-api-endpont:ci .

  publish-on-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata values
        id: vars
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          package_name="${repo_name,,}"
          release_tag="${GITHUB_REF_NAME}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}" >> "$GITHUB_OUTPUT"
          echo "package_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pkgs/container/${package_name}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value={{tag}}
          labels: |
            org.opencontainers.image.url=${{ steps.vars.outputs.release_url }}
            org.opencontainers.image.documentation=${{ steps.vars.outputs.release_url }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.release_tag }}
            org.opencontainers.image.description=HackTrapAgent access event API
            org.opencontainers.image.licenses=MIT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build release archive (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.release_tag }}
          outputs: type=docker,dest=/tmp/${{ steps.vars.outputs.package_name }}-${{ steps.vars.outputs.release_tag }}-linux-amd64.tar

      - name: Compress release archive
        run: gzip -f /tmp/${{ steps.vars.outputs.package_name }}-${{ steps.vars.outputs.release_tag }}-linux-amd64.tar

      - name: Upload archive to release assets
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/${{ steps.vars.outputs.package_name }}-${{ steps.vars.outputs.release_tag }}-linux-amd64.tar.gz
