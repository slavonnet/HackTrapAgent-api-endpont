name: docker-build

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Docker image
        run: docker build -t hacktrapagent-api-endpoint:ci .
